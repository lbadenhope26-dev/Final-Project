<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Fluorescence Dynamics</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #e2e8f0;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 30px 20px;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            display: flex;
            gap: 25px;
            max-width: 1500px;
            width: 100%;
        }

        .canvas-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .canvas-wrapper {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        canvas {
            background-color: #000;
            border-radius: 8px;
            width: 100%;
            display: block;
        }

        .graph-header {
            font-size: 0.95em;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
        }

        .panel {
            background-color: var(--bg-panel);
            padding: 25px;
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h3 { margin: 0; color: #fff; font-size: 1.2em; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        
        .control-group label {
            display: flex; justify-content: space-between;
            font-size: 0.85em; font-weight: 500; color: #cbd5e1;
        }

        input[type="range"] {
            width: 100%; accent-color: var(--accent); cursor: pointer;
        }
        
        input:disabled, select:disabled {
            opacity: 0.5; cursor: not-allowed;
        }

        select {
            background-color: #0f172a; color: #fff; border: 1px solid var(--border);
            padding: 10px; border-radius: 6px; font-family: inherit; cursor: pointer;
            width: 100%; transition: border-color 0.2s;
        }
        select:focus { outline: none; border-color: var(--accent); }

        .checkbox-group {
            display: flex; align-items: center; gap: 10px;
            background: #0f172a; padding: 12px; border-radius: 6px; border: 1px solid var(--border);
        }
        
        button {
            background-color: var(--accent); color: white; border: none;
            padding: 14px; border-radius: 6px; cursor: pointer;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.2s; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        button:hover:not(:disabled) { background-color: var(--accent-hover); transform: translateY(-1px); }
        button:disabled { background-color: var(--border); color: #64748b; cursor: not-allowed; box-shadow: none; transform: none; }

        .status-box {
            background-color: #0f172a; border: 1px solid var(--border); padding: 12px;
            border-radius: 6px; text-align: center; font-weight: bold;
            font-size: 0.85em; letter-spacing: 1px; transition: background-color 0.3s;
        }

        .readout {
            background-color: #0f172a; padding: 15px; border-radius: 6px;
            font-family: 'Consolas', 'Courier New', monospace; font-size: 0.9em;
            display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border);
        }
        .readout div { display: flex; justify-content: space-between; align-items: center; }
        .readout span { font-size: 1.1em; font-weight: bold; text-shadow: 0 0 8px rgba(255,255,255,0.2); }

        .color-preview {
            display: inline-block; width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 0 8px currentColor;
        }

        .bar-container { width: 100%; height: 24px; background-color: #0f172a; border-radius: 4px; position: relative; border: 1px solid var(--border); overflow: hidden; }
        .bar { height: 100%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bar-label { position: absolute; top: 0; left: 8px; font-size: 0.75em; font-weight: bold; line-height: 24px; text-shadow: 1px 1px 2px #000; z-index: 2; }
    </style>
</head>
<body>

<div class="container">
    <div class="canvas-col">
        <div class="canvas-wrapper">
            <div class="graph-header"><span>Physical Space (Fluorescence)</span></div>
            <canvas id="simCanvas" width="600" height="300"></canvas>
        </div>
        <div class="canvas-wrapper">
            <div class="graph-header"><span>Jablonski Energy Diagram</span></div>
            <canvas id="jablonskiCanvas" width="600" height="350"></canvas>
        </div>
    </div>

    <div class="panel">
        <h3>Simulation Parameters</h3>

        <div class="control-group">
            <label>Fluorophore Preset</label>
            <select id="sel-dye">
                <option value="custom">Custom Parameters</option>
                <option value="fluorescein">Fluorescein (FITC)</option>
                <option value="rhodamine">Rhodamine 6G</option>
                <option value="dapi">DAPI</option>
                <option value="gfp">Green Fluorescent Protein (GFP)</option>
                <option value="texas_red">Texas Red</option>
                <option value="cy5">Cyanine 5 (Cy5)</option>
                <option value="quinine">Quinine (Tonic Water)</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Excitation Wavelength (λ) <span id="val-wave-in" style="display:flex; align-items:center; gap:6px;">350 nm</span></label>
            <input type="range" id="sl-wave-in" min="200" max="700" step="1" value="350">
        </div>

        <div class="control-group">
            <label>Stokes Shift (Energy Loss) <span id="val-heat">30%</span></label>
            <input type="range" id="sl-heat" min="1" max="60" step="1" value="30">
        </div>

        <div class="control-group">
            <label>Quantum Yield (Efficiency) <span id="val-qy">80%</span></label>
            <input type="range" id="sl-qy" min="0" max="100" step="1" value="80">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="chk-iso" checked>
            <label for="chk-iso" style="margin:0; cursor:pointer; color:#fff;">Isotropic Emission (360°)</label>
        </div>
        
        <button id="btn-fire" onclick="firePhoton()">Fire Photon</button>

        <div class="status-box" id="status-display">SYSTEM IDLE</div>

        <h3>Energy Conservation Tracker</h3>
        <div class="readout">
            <div>Incoming Energy (E = hc/λ): <span id="out-in" style="color:#a78bfa;">0.00 eV</span></div>
            <div>Vibrational Relaxation: <span id="out-heat" style="color:#fb923c;">0.00 eV</span></div>
            <div style="border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px;">
                Emitted Photon: <span id="out-out" style="color:#34d399;">0.00 eV</span>
            </div>
            <div>Emission Wavelength: <span id="out-wave-out" style="display:flex; align-items:center; gap:6px;">--- nm</span></div>
        </div>

        <div class="control-group" style="gap: 12px; margin-top: 5px;">
            <div class="bar-container">
                <div class="bar" id="bar-in" style="width: 100%; background: linear-gradient(90deg, #6d28d9, #a78bfa);"></div>
                <div class="bar-label">Excitation Energy</div>
            </div>
            <div class="bar-container">
                <div class="bar" id="bar-heat" style="background: linear-gradient(90deg, #ea580c, #fb923c);"></div>
                <div class="bar-label">Thermal Loss</div>
            </div>
            <div class="bar-container">
                <div class="bar" id="bar-out" style="background: linear-gradient(90deg, #059669, #34d399);"></div>
                <div class="bar-label">Emission Energy</div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const jCanvas = document.getElementById('jablonskiCanvas');
    const jCtx = jCanvas.getContext('2d');

    const elements = {
        selDye: document.getElementById('sel-dye'),
        slWaveIn: document.getElementById('sl-wave-in'),
        slHeat: document.getElementById('sl-heat'),
        slQY: document.getElementById('sl-qy'),
        chkIso: document.getElementById('chk-iso'),
        btnFire: document.getElementById('btn-fire'),
        statusDisplay: document.getElementById('status-display'),
        outIn: document.getElementById('out-in'),
        outHeat: document.getElementById('out-heat'),
        outOut: document.getElementById('out-out'),
        outWaveOut: document.getElementById('out-wave-out'),
        barIn: document.getElementById('bar-in'),
        barHeat: document.getElementById('bar-heat'),
        barOut: document.getElementById('bar-out')
    };

    const HC = 1240; 
    let particles = []; 

    const dyePresets = {
        'fluorescein': { wave: 490, heat: 5, qy: 90 },
        'rhodamine': { wave: 530, heat: 6, qy: 95 },
        'dapi': { wave: 350, heat: 25, qy: 50 },
        'gfp': { wave: 488, heat: 4, qy: 80 },
        'texas_red': { wave: 595, heat: 3, qy: 51 },
        'cy5': { wave: 650, heat: 3, qy: 27 },
        'quinine': { wave: 350, heat: 24, qy: 55 }
    };

    let state = {
        phase: 0, time: 0,
        energyIn: 0, energyHeat: 0, energyOut: 0,
        waveIn: 0, waveOut: 0,
        photonDistance: 0, outAngle: 0, isDud: false, 
        jElectronX: 120, jElectronY: 310, dyeJiggle: 0, holdTime: 0         
    };

    function toggleControls(disabled) {
        elements.selDye.disabled = disabled;
        elements.slWaveIn.disabled = disabled;
        elements.slHeat.disabled = disabled;
        elements.slQY.disabled = disabled;
        elements.chkIso.disabled = disabled;
        elements.btnFire.disabled = disabled;
    }

    function waveToRGB(W) {
        let R, G, B;
        if (W >= 200 && W < 380) { let i = (W-200)/180; return `rgb(${Math.round(150*i)}, 0, 255)`; }
        else if (W >= 380 && W < 440) { R = -(W - 440) / 60; G = 0.0; B = 1.0; }
        else if (W >= 440 && W < 490) { R = 0.0; G = (W - 440) / 50; B = 1.0; }
        else if (W >= 490 && W < 510) { R = 0.0; G = 1.0; B = -(W - 510) / 20; }
        else if (W >= 510 && W < 580) { R = (W - 510) / 70; G = 1.0; B = 0.0; }
        else if (W >= 580 && W < 645) { R = 1.0; G = -(W - 645) / 65; B = 0.0; }
        else if (W >= 645 && W <= 780) { R = 1.0; G = 0.0; B = 0.0; }
        else { R = 0.5; G = 0.0; B = 0.0; }
        return `rgb(${Math.round(R * 255)}, ${Math.round(G * 255)}, ${Math.round(B * 255)})`;
    }

    function calculatePhysics(forceDudOverride = false) {
        state.waveIn = parseFloat(elements.slWaveIn.value);
        const rawEnergyIn = HC / state.waveIn;
        const heatLossPct = parseFloat(elements.slHeat.value) / 100;
        
        // BUG FIX: Strict rounding to 2 decimal places to ensure visual energy conservation
        state.energyIn = Math.round(rawEnergyIn * 100) / 100;
        
        if (forceDudOverride) {
            state.energyHeat = state.energyIn;
            state.energyOut = 0; 
            state.waveOut = 0; 
        } else {
            state.energyHeat = Math.round((state.energyIn * heatLossPct) * 100) / 100;
            state.energyOut = Math.round((state.energyIn - state.energyHeat) * 100) / 100; 
            state.waveOut = state.energyOut > 0 ? HC / state.energyOut : 0;
        }

        const colorIn = waveToRGB(state.waveIn);
        document.getElementById('val-wave-in').innerHTML = `${state.waveIn} nm <span class="color-preview" style="background:${colorIn}; color:${colorIn}"></span>`;
        document.getElementById('val-heat').innerText = elements.slHeat.value + "%";
        document.getElementById('val-qy').innerText = elements.slQY.value + "%";
        updateTelemetry();
    }

    function updateTelemetry() {
        elements.outIn.innerText = state.energyIn.toFixed(2) + " eV";
        elements.outHeat.innerText = state.energyHeat.toFixed(2) + " eV";
        elements.outOut.innerText = state.energyOut.toFixed(2) + " eV";

        if (state.energyOut === 0) {
            elements.outWaveOut.innerHTML = `NONE (Heat Only) <span class="color-preview" style="background:#222; border-color:#555"></span>`;
            elements.outWaveOut.style.color = "#64748b";
        } else {
            let colorOut = waveToRGB(state.waveOut);
            elements.outWaveOut.innerHTML = `${state.waveOut.toFixed(0)} nm <span class="color-preview" style="background:${colorOut}; color:${colorOut}"></span>`;
            elements.outWaveOut.style.color = colorOut;
        }

        elements.barHeat.style.width = ((state.energyHeat / state.energyIn) * 100) + "%";
        elements.barOut.style.width = ((state.energyOut / state.energyIn) * 100) + "%";
    }

    elements.selDye.addEventListener('change', (e) => {
        if (e.target.value !== 'custom') {
            const p = dyePresets[e.target.value];
            elements.slWaveIn.value = p.wave; elements.slHeat.value = p.heat; elements.slQY.value = p.qy;
            calculatePhysics(false);
        }
    });

    [elements.slWaveIn, elements.slHeat, elements.slQY].forEach(el => {
        el.addEventListener('input', () => { elements.selDye.value = 'custom'; if (state.phase === 0) calculatePhysics(false); });
    });

    function firePhoton() {
        if (state.phase !== 0) return;
        state.isDud = Math.random() > (parseFloat(elements.slQY.value) / 100);
        state.outAngle = elements.chkIso.checked ? Math.random() * Math.PI * 2 : 0; 
        calculatePhysics(false); 
        
        elements.statusDisplay.innerText = "EXCITATION IN PROGRESS";
        elements.statusDisplay.style.backgroundColor = "#4c1d95";
        elements.statusDisplay.style.color = "#c4b5fd";
        
        toggleControls(true); // BUG FIX: Lock controls during animation
        
        state.phase = 1; state.photonDistance = -300; state.time = 0; state.holdTime = 0;
        state.jElectronX = 120; state.jElectronY = 310; state.dyeJiggle = 0;
        particles = []; 
    }

    function spawnHeatParticle(x, y) {
        particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 150, vy: (Math.random() - 0.5) * 150, life: 1.0, size: Math.random() * 3 + 2 });
    }

    function drawPhoton(ctx, xC, yC, dist, angle, wave, color) {
        ctx.save(); ctx.translate(xC, yC); ctx.rotate(angle);
        ctx.beginPath();
        ctx.shadowBlur = 15; ctx.shadowColor = color;
        ctx.strokeStyle = color; ctx.lineWidth = 4;
        
        const freq = 40 / wave; 
        for (let x = -40; x <= 40; x += 2) {
            let env = Math.exp(-(x*x)/400); 
            let y = Math.sin((x - state.time * 300) * freq) * 15 * env;
            if (x === -40) ctx.moveTo(dist + x, y); else ctx.lineTo(dist + x, y);
        }
        ctx.stroke(); ctx.restore();
    }

    let lastTime = performance.now();

    function loop(timestamp) {
        let dt = (timestamp - lastTime) / 1000; 
        lastTime = timestamp;
        if (dt > 0.1) dt = 0.1; 
        state.time += dt;

        const molX = canvas.width / 2; const molY = 150;
        
        const jS0_Y = 310; 
        const jS1_Y = jS0_Y - (state.energyIn * 55); 
        const jS1_Relaxed_Y = Math.min(jS0_Y - 15, jS1_Y + Math.max(40, state.energyHeat * 55)); 

        if (state.phase === 1) { 
            state.photonDistance += 400 * dt;
            if (state.photonDistance >= 0) {
                state.phase = 1.5; state.photonDistance = 0;
            }
        } 
        else if (state.phase === 1.5) { 
            state.jElectronY -= ((jS0_Y - jS1_Y) / 0.15) * dt;
            if (state.jElectronY <= jS1_Y) {
                state.jElectronY = jS1_Y; state.phase = 2; state.holdTime = 0; // Reset holdTime for accurate ripple/jiggle
                
                if (state.isDud) {
                    calculatePhysics(true); 
                    elements.statusDisplay.innerText = "NON-RADIATIVE DECAY (HEAT LOSS)";
                    elements.statusDisplay.style.backgroundColor = "#7f1d1d";
                    elements.statusDisplay.style.color = "#fca5a5";
                } else {
                    elements.statusDisplay.innerText = "VIBRATIONAL RELAXATION";
                    elements.statusDisplay.style.backgroundColor = "#7c2d12";
                    elements.statusDisplay.style.color = "#fdba74";
                }
            }
        } 
        else if (state.phase === 2) { 
            state.holdTime += dt;
            state.dyeJiggle = Math.sin(state.holdTime * 60) * (state.isDud ? 12 : 6); 
            
            if(Math.random() < (state.isDud ? 0.6 : 0.3)) spawnHeatParticle(molX + state.dyeJiggle, molY);
            if(Math.random() < 0.2) spawnHeatParticle(state.jElectronX, state.jElectronY); 

            let targetY = state.isDud ? jS0_Y : jS1_Relaxed_Y;
            
            if (state.jElectronY < targetY) {
                state.jElectronY += ((targetY - jS1_Y) / 0.8) * dt;
                if (state.jElectronY > targetY) state.jElectronY = targetY;
            } 
            if (state.jElectronX < 250) {
                state.jElectronX += (130 / 0.8) * dt;
            }

            if (state.jElectronY === targetY && state.jElectronX >= 250) {
                if (state.holdTime > 1.0) { // Keep hold time logic intact
                    state.phase = state.isDud ? 4 : 2.5; 
                    state.dyeJiggle = 0;
                }
            }
        } 
        else if (state.phase === 2.5) { 
            state.jElectronX += (200 / 0.4) * dt;
            if (state.jElectronX >= 450) {
                state.jElectronX = 450; state.phase = 3; state.photonDistance = 0;
                elements.statusDisplay.innerText = "FLUORESCENCE EMISSION";
                elements.statusDisplay.style.backgroundColor = "#064e3b";
                elements.statusDisplay.style.color = "#6ee7b7";
            }
        } 
        else if (state.phase === 3) { 
            state.photonDistance += 400 * dt;
            if (state.jElectronY < jS0_Y) {
                state.jElectronY += ((jS0_Y - jS1_Relaxed_Y) / 0.3) * dt;
                if (state.jElectronY > jS0_Y) state.jElectronY = jS0_Y;
            }
            if (state.photonDistance > 400 && state.jElectronY >= jS0_Y) state.phase = 4;
        } 
        else if (state.phase === 4) { 
            state.jElectronX -= 600 * dt;
            if (state.jElectronX <= 120) {
                state.jElectronX = 120; state.phase = 0; 
                toggleControls(false); // BUG FIX: Unlock controls
                elements.statusDisplay.innerText = "SYSTEM IDLE";
                elements.statusDisplay.style.backgroundColor = "#0f172a";
                elements.statusDisplay.style.color = "#e2e8f0";
                if(state.isDud) calculatePhysics(false);
            }
        }

        particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt*1.5; });
        particles = particles.filter(p => p.life > 0);

        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#334155'; ctx.fillRect(20, molY - 15, 60, 30);
        ctx.fillStyle = '#475569'; ctx.fillRect(80, molY - 5, 20, 10);
        
        // BUG FIX: Accurate Ripple tied to phase holdTime
        if (state.phase === 2 && state.holdTime > 0) {
            let rippleRadius = 30 + (state.holdTime * 80);
            let rippleAlpha = Math.max(0, 1 - (state.holdTime * 1.5));
            if (rippleAlpha > 0) {
                ctx.beginPath(); ctx.arc(molX, molY, rippleRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${rippleAlpha})`;
                ctx.lineWidth = 2; ctx.stroke();
            }
        }

        ctx.beginPath(); ctx.arc(molX + state.dyeJiggle, molY, 30, 0, Math.PI * 2);
        if (state.phase >= 1.5 && state.phase < 3) {
            let g = ctx.createRadialGradient(molX+state.dyeJiggle, molY, 0, molX+state.dyeJiggle, molY, 40);
            let glowCol = state.isDud ? '#dc2626' : '#ea580c';
            g.addColorStop(0, glowCol); g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g; ctx.fill();
        }
        ctx.fillStyle = '#1e293b'; ctx.fill();
        ctx.strokeStyle = (state.phase >= 1.5 && state.phase < 3) ? '#f8fafc' : '#64748b';
        ctx.lineWidth = 3; ctx.stroke();

        particles.forEach(p => {
            ctx.fillStyle = `rgba(251, 146, 60, ${p.life})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });

        if (state.phase === 1) drawPhoton(ctx, molX, molY, state.photonDistance, 0, state.waveIn, waveToRGB(state.waveIn));
        else if (state.phase === 3) drawPhoton(ctx, molX, molY, state.photonDistance, state.outAngle, state.waveOut, waveToRGB(state.waveOut));

        jCtx.fillStyle = '#050505'; jCtx.fillRect(0, 0, jCanvas.width, jCanvas.height);

        jCtx.lineWidth = 3; jCtx.font = "bold 14px sans-serif";
        
        jCtx.strokeStyle = '#475569'; jCtx.beginPath(); jCtx.
