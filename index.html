<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluorescence & The Stokes Shift</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-main: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #e2e8f0;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --border: #334155;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            overflow-y: auto;
            line-height: 1.3;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1000px;
            width: 100%;
        }

.canvas-col {
            display: flex;
            flex-direction: column;
            gap: 10px; /* This is your strict gap. Reduce to 5px if you want it tighter */
            flex: 1;
            min-width: 320px;
            max-width: 600px;
            /* justify-content: space-between; <-- REMOVED */
        }

        .canvas-wrapper {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            
            /* ADDED: Makes the boxes stretch to fill the column, keeping the edges aligned */
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center; /* Keeps the canvas vertically centered in the taller box */
        }
        }

        canvas {
            background-color: #000;
            border-radius: 6px;
            width: 100%;
            display: block;
        }

        .graph-header {
            font-size: 0.75em;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .panel {
            background-color: var(--bg-panel);
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h3 { margin: 0; color: #fff; font-size: 0.95em; border-bottom: 1px solid var(--border); padding-bottom: 4px; }

        .control-group { display: flex; flex-direction: column; gap: 4px; }
        
        .control-group label {
            display: flex; justify-content: space-between;
            font-size: 0.75em; font-weight: 500; color: #cbd5e1;
        }

        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; margin: 2px 0; }
        input:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }

        select {
            background-color: #0f172a; color: #fff; border: 1px solid var(--border);
            padding: 8px 6px; border-radius: 4px; font-family: inherit; cursor: pointer;
            width: 100%; font-size: 0.85em; transition: border-color 0.2s;
        }
        select:focus { outline: none; border-color: var(--accent); }

        .checkbox-group {
            display: flex; align-items: center; gap: 6px;
            background: #0f172a; padding: 8px; border-radius: 4px; border: 1px solid var(--border);
        }
        .checkbox-group label { margin: 0; cursor: pointer; color: #fff; font-size: 0.8em; }
        
        button {
            background-color: var(--accent); color: white; border: none;
            padding: 10px; border-radius: 4px; cursor: pointer;
            font-weight: 700; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.2s; box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
            margin-top: 4px;
        }
        button:hover:not(:disabled) { background-color: var(--accent-hover); transform: translateY(-1px); }
        button:disabled { background-color: var(--border); color: #64748b; cursor: not-allowed; box-shadow: none; transform: none; }

        .status-box {
            background-color: #0f172a; border: 1px solid var(--border); padding: 8px;
            border-radius: 4px; text-align: center; font-weight: bold;
            font-size: 0.75em; letter-spacing: 1px; transition: background-color 0.3s;
        }

        .readout {
            background-color: #0f172a; padding: 10px; border-radius: 4px;
            font-family: 'Consolas', 'Courier New', monospace; font-size: 0.8em;
            display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--border);
        }
        .readout div { display: flex; justify-content: space-between; align-items: center; }
        .readout span { font-size: 1.05em; font-weight: bold; text-shadow: 0 0 8px rgba(255,255,255,0.2); }

        .color-preview {
            display: inline-block; width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 0 4px currentColor;
        }

        .bar-container { width: 100%; height: 16px; background-color: #0f172a; border-radius: 3px; position: relative; border: 1px solid var(--border); overflow: hidden; margin-bottom: 4px; }
        .bar { height: 100%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bar-label { position: absolute; top: 0; left: 8px; font-size: 0.7em; font-weight: bold; line-height: 16px; text-shadow: 1px 1px 2px #000; z-index: 2; }
    </style>
</head>
<body>

<div class="container">
    <div class="canvas-col">
        <div class="canvas-wrapper">
            <div class="graph-header"><span>Physical Space (Fluorescence)</span></div>
            <canvas id="simCanvas" width="600" height="200"></canvas>
        </div>
        <div class="canvas-wrapper">
            <div class="graph-header"><span>Jablonski Energy Diagram</span></div>
            <canvas id="jablonskiCanvas" width="600" height="230"></canvas>
        </div>
    </div>

    <div class="panel">
        <h3>Simulation Parameters</h3>

        <div class="control-group">
            <label>Fluorophore Preset</label>
            <select id="sel-dye">
                <option value="base">Base Example (UV to Green)</option>
                <option value="dapi">DAPI (UV to Blue)</option>
                <option value="quinine">Quinine / Tonic Water (UV to Cyan)</option>
                <option value="hoechst">Hoechst 33342 (UV to Blue)</option>
                <option value="gfp_wt">Wild-Type GFP (UV to Green)</option>
                <option value="fura2">Fura-2 (UV to Green)</option>
                <option value="qdot605">Quantum Dot 605 (UV to Orange)</option>
                <option value="europium">Europium Chelate (UV to Red)</option>
                <option value="custom">Custom Parameters</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Excitation Wavelength (λ) <span id="val-wave-in" style="display:flex; align-items:center; gap:6px;">350 nm</span></label>
            <input type="range" id="sl-wave-in" min="200" max="400" step="1" value="350">
        </div>

        <div class="control-group">
            <label>Stokes Shift (Energy Loss) <span id="val-heat">32%</span></label>
            <input type="range" id="sl-heat" min="1" max="60" step="1" value="32">
        </div>

        <div class="control-group">
            <label>Quantum Yield (Efficiency) <span id="val-qy">100%</span></label>
            <input type="range" id="sl-qy" min="0" max="100" step="1" value="100">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="chk-iso" checked>
            <label for="chk-iso">Isotropic Emission (360°)</label>
        </div>
        
        <button id="btn-fire" onclick="firePhoton()">Fire UV Flashlight</button>

        <div class="status-box" id="status-display">SYSTEM IDLE</div>

        <h3>Energy Tracker</h3>
        <div class="readout">
            <div>Incoming E = hc/λ: <span id="out-in" style="color:#a78bfa;">0.00 eV</span></div>
            <div>Vibrational Loss: <span id="out-heat" style="color:#fb923c;">0.00 eV</span></div>
            <div style="border-top: 1px solid var(--border); padding-top: 8px; margin-top: 2px;">
                Emitted Photon: <span id="out-out" style="color:#34d399;">0.00 eV</span>
            </div>
            <div>Emission Wavelength: <span id="out-wave-out" style="display:flex; align-items:center; gap:6px;">--- nm</span></div>
        </div>

        <div class="control-group" style="gap: 4px; margin-top: auto;">
            <div class="bar-container">
                <div class="bar" id="bar-in" style="width: 100%; background: linear-gradient(90deg, #6d28d9, #a78bfa);"></div>
                <div class="bar-label">Excitation</div>
            </div>
            <div class="bar-container">
                <div class="bar" id="bar-heat" style="background: linear-gradient(90deg, #ea580c, #fb923c);"></div>
                <div class="bar-label">Thermal Loss</div>
            </div>
            <div class="bar-container">
                <div class="bar" id="bar-out" style="background: linear-gradient(90deg, #059669, #34d399);"></div>
                <div class="bar-label">Emission</div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const jCanvas = document.getElementById('jablonskiCanvas');
    const jCtx = jCanvas.getContext('2d');

    const elements = {
        selDye: document.getElementById('sel-dye'),
        slWaveIn: document.getElementById('sl-wave-in'),
        slHeat: document.getElementById('sl-heat'),
        slQY: document.getElementById('sl-qy'),
        chkIso: document.getElementById('chk-iso'),
        btnFire: document.getElementById('btn-fire'),
        statusDisplay: document.getElementById('status-display'),
        outIn: document.getElementById('out-in'),
        outHeat: document.getElementById('out-heat'),
        outOut: document.getElementById('out-out'),
        outWaveOut: document.getElementById('out-wave-out'),
        barIn: document.getElementById('bar-in'),
        barHeat: document.getElementById('bar-heat'),
        barOut: document.getElementById('bar-out')
    };

    const HC = 1240; 
    let particles = []; 

    const dyePresets = {
        'base': { wave: 350, heat: 32, qy: 100 }, 
        'dapi': { wave: 350, heat: 25, qy: 50 },
        'quinine': { wave: 350, heat: 24, qy: 55 },
        'hoechst': { wave: 350, heat: 24, qy: 40 },
        'gfp_wt': { wave: 395, heat: 22, qy: 79 },
        'fura2': { wave: 340, heat: 33, qy: 23 },
        'qdot605': { wave: 350, heat: 42, qy: 60 },
        'europium': { wave: 340, heat: 45, qy: 50 }
    };

    let state = {
        phase: 0, time: 0,
        energyIn: 0, energyHeat: 0, energyOut: 0,
        waveIn: 0, waveOut: 0,
        photonDistance: 0, outAngle: 0, isDud: false, 
        jElectronX: 120, jElectronY: 190, dyeJiggle: 0, holdTime: 0         
    };

    function toggleControls(disabled) {
        elements.selDye.disabled = disabled;
        elements.slWaveIn.disabled = disabled;
        elements.slHeat.disabled = disabled;
        elements.slQY.disabled = disabled;
        elements.chkIso.disabled = disabled;
        elements.btnFire.disabled = disabled;
    }

    function waveToRGB(W) {
        let R, G, B;
        if (W >= 200 && W < 380) { let i = (W-200)/180; return `rgb(${Math.round(150*i)}, 0, 255)`; }
        else if (W >= 380 && W < 440) { R = -(W - 440) / 60; G = 0.0; B = 1.0; }
        else if (W >= 440 && W < 490) { R = 0.0; G = (W - 440) / 50; B = 1.0; }
        else if (W >= 490 && W < 510) { R = 0.0; G = 1.0; B = -(W - 510) / 20; }
        else if (W >= 510 && W < 580) { R = (W - 510) / 70; G = 1.0; B = 0.0; }
        else if (W >= 580 && W < 645) { R = 1.0; G = -(W - 645) / 65; B = 0.0; }
        else if (W >= 645 && W <= 780) { R = 1.0; G = 0.0; B = 0.0; }
        else { R = 0.5; G = 0.0; B = 0.0; }
        return `rgb(${Math.round(R * 255)}, ${Math.round(G * 255)}, ${Math.round(B * 255)})`;
    }

    function calculatePhysics(forceDudOverride = false) {
        state.waveIn = parseFloat(elements.slWaveIn.value);
        const rawEnergyIn = HC / state.waveIn;
        const heatLossPct = parseFloat(elements.slHeat.value) / 100;
        
        state.energyIn = Math.round(rawEnergyIn * 100) / 100;
        
        if (forceDudOverride) {
            state.energyHeat = state.energyIn;
            state.energyOut = 0; 
            state.waveOut = 0; 
        } else {
            state.energyHeat = Math.round((state.energyIn * heatLossPct) * 100) / 100;
            state.energyOut = Math.round((state.energyIn - state.energyHeat) * 100) / 100; 
            state.waveOut = state.energyOut > 0 ? HC / state.energyOut : 0;
        }

        const colorIn = waveToRGB(state.waveIn);
        document.getElementById('val-wave-in').innerHTML = `${state.waveIn} nm <span class="color-preview" style="background:${colorIn}; color:${colorIn}"></span>`;
        document.getElementById('val-heat').innerText = elements.slHeat.value + "%";
        document.getElementById('val-qy').innerText = elements.slQY.value + "%";
        updateTelemetry();
    }

    function updateTelemetry() {
        elements.outIn.innerText = state.energyIn.toFixed(2) + " eV";
        elements.outHeat.innerText = state.energyHeat.toFixed(2) + " eV";
        elements.outOut.innerText = state.energyOut.toFixed(2) + " eV";

        if (state.energyOut === 0) {
            elements.outWaveOut.innerHTML = `NONE (Heat) <span class="color-preview" style="background:#222; border-color:#555"></span>`;
            elements.outWaveOut.style.color = "#64748b";
        } else {
            let colorOut = waveToRGB(state.waveOut);
            elements.outWaveOut.innerHTML = `${state.waveOut.toFixed(0)} nm <span class="color-preview" style="background:${colorOut}; color:${colorOut}"></span>`;
            elements.outWaveOut.style.color = colorOut;
        }

        elements.barHeat.style.width = ((state.energyHeat / state.energyIn) * 100) + "%";
        elements.barOut.style.width = ((state.energyOut / state.energyIn) * 100) + "%";
    }

    elements.selDye.addEventListener('change', (e) => {
        if (e.target.value !== 'custom') {
            const p = dyePresets[e.target.value];
            elements.slWaveIn.value = p.wave; elements.slHeat.value = p.heat; elements.slQY.value = p.qy;
            calculatePhysics(false);
        }
    });

    // These sliders change the physical properties of the dye, so they trigger "Custom"
    [elements.slHeat, elements.slQY].forEach(el => {
        el.addEventListener('input', () => { 
            elements.selDye.value = 'custom'; 
            if (state.phase === 0) calculatePhysics(false); 
        });
    });

    // The wavelength slider just changes the input light, so it keeps the current dye selected
    elements.slWaveIn.addEventListener('input', () => { 
        if (state.phase === 0) calculatePhysics(false); 
    });

    function firePhoton() {
        if (state.phase !== 0) return;
        state.isDud = Math.random() > (parseFloat(elements.slQY.value) / 100);
        state.outAngle = elements.chkIso.checked ? Math.random() * Math.PI * 2 : 0; 
        calculatePhysics(false); 
        
        elements.statusDisplay.innerText = "EXCITATION IN PROGRESS";
        elements.statusDisplay.style.backgroundColor = "#4c1d95";
        elements.statusDisplay.style.color = "#c4b5fd";
        
        toggleControls(true); 
        
        state.phase = 1; state.photonDistance = -300; state.time = 0; state.holdTime = 0;
        state.jElectronX = 120; state.jElectronY = 190; state.dyeJiggle = 0;
    }

    function spawnHeatParticle(x, y, isJablonski = false) {
        particles.push({ 
            x: x, y: y, 
            vx: (Math.random() - 0.5) * 120, vy: (Math.random() - 0.5) * 120, 
            life: 1.0, size: Math.random() * 2 + 1.5,
            isJ: isJablonski
        });
    }

    function drawPhoton(ctx, xC, yC, dist, angle, wave, color) {
        ctx.save(); ctx.translate(xC, yC); ctx.rotate(angle);
        ctx.beginPath();
        ctx.shadowBlur = 10; ctx.shadowColor = color;
        ctx.strokeStyle = color; ctx.lineWidth = 3;
        
        const freq = 40 / wave; 
        for (let x = -30; x <= 30; x++) {
            let env = Math.exp(-(x*x)/200); 
            let y = Math.sin((x - state.time * 400) * freq) * 12 * env;
            if (x === -30) ctx.moveTo(dist + x, y); else ctx.lineTo(dist + x, y);
        }
        ctx.stroke(); ctx.restore();
    }

    let lastTime = 0;

    function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000; 
        lastTime = timestamp;
        if (dt > 0.1) dt = 0.1; 
        state.time += dt;

        const molX = canvas.width / 2; const molY = 100;
        
        const jS0_Y = 190; 
        const jS1_Y = jS0_Y - (state.energyIn * 28); 
        const jS1_Relaxed_Y = Math.min(jS0_Y - 12, jS1_Y + Math.max(15, state.energyHeat * 28)); 

        if (state.phase === 1) { 
            state.photonDistance += 450 * dt; 
            if (state.photonDistance >= 0) {
                state.phase = 1.5; state.photonDistance = 0;
            }
        } 
        else if (state.phase === 1.5) { 
            state.jElectronY += (jS1_Y - state.jElectronY) * 12 * dt;
            if (Math.abs(state.jElectronY - jS1_Y) < 1.5) {
                state.jElectronY = jS1_Y; state.phase = 2; state.holdTime = 0; 
                if (state.isDud) {
                    calculatePhysics(true); 
                    elements.statusDisplay.innerText = "NON-RADIATIVE DECAY (HEAT)";
                    elements.statusDisplay.style.backgroundColor = "#7f1d1d";
                    elements.statusDisplay.style.color = "#fca5a5";
                } else {
                    elements.statusDisplay.innerText = "VIBRATIONAL RELAXATION";
                    elements.statusDisplay.style.backgroundColor = "#7c2d12";
                    elements.statusDisplay.style.color = "#fdba74";
                }
            }
        } 
        else if (state.phase === 2) { 
            state.holdTime += dt;
            state.dyeJiggle = Math.sin(state.holdTime * 60) * (state.isDud ? 10 : 5); 
            
            if(Math.random() < (state.isDud ? 0.6 : 0.3)) spawnHeatParticle(molX + state.dyeJiggle, molY, false);
            if(Math.random() < 0.2) spawnHeatParticle(state.jElectronX, state.jElectronY, true); 

            let targetY = state.isDud ? jS0_Y : jS1_Relaxed_Y;
            let targetX = 250;

            state.jElectronY += (targetY - state.jElectronY) * 6 * dt;
            state.jElectronX += (targetX - state.jElectronX) * 8 * dt;

            if (Math.abs(state.jElectronY - targetY) < 1.5 && Math.abs(state.jElectronX - targetX) < 1.5) {
                if (state.holdTime > 0.8) { 
                    if (state.isDud) {
                        state.phase = 4;
                    } else {
                        state.phase = 3; 
                        state.photonDistance = 0;
                        elements.statusDisplay.innerText = "FLUORESCENCE EMISSION";
                        elements.statusDisplay.style.backgroundColor = "#064e3b";
                        elements.statusDisplay.style.color = "#6ee7b7";
                    }
                    state.dyeJiggle = 0;
                }
            }
        } 
        else if (state.phase === 3) { 
            state.photonDistance += 450 * dt;
            state.jElectronY += (jS0_Y - state.jElectronY) * 12 * dt;
            
            if (state.photonDistance > 450 && Math.abs(state.jElectronY - jS0_Y) < 1.5) {
                state.jElectronY = jS0_Y;
                state.phase = 4;
            }
        } 
        else if (state.phase === 4) { 
            state.jElectronX += (120 - state.jElectronX) * 8 * dt;
            
            if (Math.abs(state.jElectronX - 120) < 1.5) {
                state.jElectronX = 120; state.phase = 0; 
                toggleControls(false); 
                elements.statusDisplay.innerText = "SYSTEM IDLE";
                elements.statusDisplay.style.backgroundColor = "#0f172a";
                elements.statusDisplay.style.color = "#e2e8f0";
                if(state.isDud) calculatePhysics(false);
            }
        }

        particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt*1.5; });
        particles = particles.filter(p => p.life > 0);

        // --- RENDER PHYSICAL CANVAS ---
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (state.phase === 1) drawPhoton(ctx, molX, molY, state.photonDistance, 0, state.waveIn, waveToRGB(state.waveIn));
        
        ctx.fillStyle = '#334155'; 
        ctx.fillRect(10, molY - 10, 40, 20); 
        ctx.fillStyle = '#475569'; 
        ctx.beginPath();
        ctx.moveTo(50, molY - 10);
        ctx.lineTo(65, molY - 16);
        ctx.lineTo(65, molY + 16);
        ctx.lineTo(50, molY + 10);
        ctx.closePath();
        ctx.fill();
        
        if (state.phase === 2 && state.holdTime > 0) {
            let rippleRadius = 25 + (state.holdTime * 70);
            let rippleAlpha = Math.max(0, 1 - (state.holdTime * 1.5));
            if (rippleAlpha > 0) {
                ctx.beginPath(); ctx.arc(molX, molY, rippleRadius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${rippleAlpha})`;
                ctx.lineWidth = 1.5; ctx.stroke();
            }
        }

        ctx.beginPath(); ctx.arc(molX + state.dyeJiggle, molY, 25, 0, Math.PI * 2);
        if (state.phase >= 1.5 && state.phase < 3) {
            let g = ctx.createRadialGradient(molX+state.dyeJiggle, molY, 0, molX+state.dyeJiggle, molY, 35);
            let glowCol = state.isDud ? '#dc2626' : '#ea580c';
            g.addColorStop(0, glowCol); g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g; ctx.fill();
        }
        ctx.fillStyle = '#1e293b'; ctx.fill();
        ctx.strokeStyle = (state.phase >= 1.5 && state.phase < 3) ? '#f8fafc' : '#64748b';
        ctx.lineWidth = 2.5; ctx.stroke();

        if (state.phase === 3) drawPhoton(ctx, molX, molY, state.photonDistance, state.outAngle, state.waveOut, waveToRGB(state.waveOut));

        particles.filter(p => !p.isJ).forEach(p => {
            ctx.fillStyle = `rgba(251, 146, 60, ${p.life})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });

        // --- RENDER JABLONSKI CANVAS ---
        jCtx.fillStyle = '#050505'; jCtx.fillRect(0, 0, jCanvas.width, jCanvas.height);

        jCtx.lineWidth = 2.5; jCtx.font = "bold 12px sans-serif";
        
        jCtx.strokeStyle = '#475569'; jCtx.beginPath(); jCtx.moveTo(60, jS0_Y); jCtx.lineTo(540, jS0_Y); jCtx.stroke();
        jCtx.fillStyle = '#94a3b8'; jCtx.fillText("S0 (Ground State)", 60, jS0_Y + 18);

        const s1LabelY = Math.max(14, jS1_Y - 8);
        jCtx.strokeStyle = '#64748b'; jCtx.beginPath(); jCtx.moveTo(60, jS1_Y); jCtx.lineTo(300, jS1_Y); jCtx.stroke();
        jCtx.fillText("S1 (Excited State)", 60, s1LabelY);

        if (!state.isDud) {
            jCtx.lineWidth = 1.5; jCtx.strokeStyle = '#334155';
            for(let v = 1; v <= 4; v++) {
                let vy = jS1_Y + (v * ((jS1_Relaxed_Y - jS1_Y)/5));
                jCtx.beginPath(); jCtx.moveTo(150, vy); jCtx.lineTo(400, vy); jCtx.stroke();
            }
            jCtx.lineWidth = 2.5; jCtx.strokeStyle = '#059669';
            jCtx.beginPath(); jCtx.moveTo(200, jS1_Relaxed_Y); jCtx.lineTo(540, jS1_Relaxed_Y); jCtx.stroke();
            jCtx.fillStyle = '#34d399'; jCtx.fillText("v=0", 440, jS1_Relaxed_Y - 6);
        }

        function drawJArrow(fx, fy, tx, ty, color, dash=false) {
            jCtx.save();
            jCtx.strokeStyle = color; 
            jCtx.fillStyle = color;
            jCtx.lineWidth = 2.5;
            if(dash) jCtx.setLineDash([5, 5]);
            
            jCtx.beginPath(); jCtx.moveTo(fx, fy); jCtx.lineTo(tx, ty); jCtx.stroke();
            
            jCtx.setLineDash([]);
            let ang = Math.atan2(ty-fy, tx-fx);
            jCtx.beginPath(); jCtx.moveTo(tx, ty);
            jCtx.lineTo(tx - 8*Math.cos(ang - Math.PI/6), ty - 8*Math.sin(ang - Math.PI/6));
            jCtx.lineTo(tx - 8*Math.cos(ang + Math.PI/6), ty - 8*Math.sin(ang + Math.PI/6));
            jCtx.fill();
            jCtx.restore();
        }

        if (state.phase === 1 || state.phase === 1.5) { 
            drawJArrow(120, jS0_Y, 120, jS1_Y, waveToRGB(state.waveIn));
        } else if (state.phase === 2) { 
            let jCol = state.isDud ? '#ef4444' : '#f59e0b';
            drawJArrow(120, jS1_Y, 250, state.isDud ? jS0_Y : jS1_Relaxed_Y, jCol, true); 
            jCtx.fillStyle = jCol;
            jCtx.fillText(state.isDud ? "Non-Radiative" : "Internal Conversion", 260, (jS1_Y + jS0_Y)/2);
        } else if (state.phase === 3) { 
            drawJArrow(250, jS1_Relaxed_Y, 250, jS0_Y, waveToRGB(state.waveOut)); 
        }

        particles.filter(p => p.isJ).forEach(p => {
            jCtx.fillStyle = `rgba(251, 146, 60, ${p.life})`;
            jCtx.beginPath(); jCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); jCtx.fill();
        });

        jCtx.beginPath(); jCtx.arc(state.jElectronX, state.jElectronY, 6, 0, Math.PI * 2);
        jCtx.fillStyle = '#38bdf8'; jCtx.fill();
        jCtx.shadowBlur = 10; jCtx.shadowColor = '#38bdf8';
        jCtx.strokeStyle = '#fff'; jCtx.lineWidth = 1.5; jCtx.stroke();
        jCtx.shadowBlur = 0;

        requestAnimationFrame(loop);
    }

    elements.selDye.value = 'base';
    elements.slWaveIn.value = dyePresets['base'].wave;
    elements.slHeat.value = dyePresets['base'].heat;
    elements.slQY.value = dyePresets['base'].qy;
    calculatePhysics(false);
    requestAnimationFrame(loop);

</script>
</body>
</html>
