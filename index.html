<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluorescence & The Stokes Shift</title>

<style>
* { box-sizing: border-box; }

:root {
    --bg-main: #0f172a;
    --bg-panel: #1e293b;
    --text-main: #e2e8f0;
    --accent: #8b5cf6;
    --accent-hover: #7c3aed;
    --border: #334155;
}

body {
    font-family: 'Inter', system-ui, sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 20px 10px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    max-width: 1000px;
    width: 100%;
    align-items: stretch; /* KEY */
}

.canvas-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    min-width: 320px;
    max-width: 600px;
}

.canvas-wrapper {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);

    flex: 1; /* split height */
    display: flex;
    flex-direction: column;
}

canvas {
    background-color: #000;
    border-radius: 6px;
    width: 100%;
    height: 100%;
    display: block;
}

.graph-header {
    font-size: 0.75em;
    font-weight: 600;
    color: #94a3b8;
    margin-bottom: 4px;
    text-transform: uppercase;
}

/* RIGHT PANEL unchanged */
.panel {
    background-color: var(--bg-panel);
    padding: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* rest unchanged... */
</style>
</head>

<body>

<div class="container">
    <div class="canvas-col">
        <div class="canvas-wrapper">
            <div class="graph-header">Physical Space (Fluorescence)</div>
            <canvas id="simCanvas"></canvas>
        </div>

        <div class="canvas-wrapper">
            <div class="graph-header">Jablonski Energy Diagram</div>
            <canvas id="jablonskiCanvas"></canvas>
        </div>
    </div>

    <div class="panel">
        <!-- (UNCHANGED PANEL CONTENT) -->
        <h3>Simulation Parameters</h3>
        <!-- keep everything exactly as you had -->
    </div>
</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const jCanvas = document.getElementById('jablonskiCanvas');
const jCtx = jCanvas.getContext('2d');

/* ✅ NEW: crisp responsive canvas sizing */
function resizeCanvas(c) {
    const rect = c.getBoundingClientRect();
    c.width = rect.width;
    c.height = rect.height;
}

function resizeAll() {
    resizeCanvas(canvas);
    resizeCanvas(jCanvas);
}
window.addEventListener('resize', resizeAll);
resizeAll();

/* everything else in your JS stays EXACTLY the same */
</script>

</body>
</html>
